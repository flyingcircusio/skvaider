# Sample config used by the development environment
models_dir = "var/lib/models-1"

[server]
host = "127.0.0.1"
port = 8001

[logging]
log_level = "DEBUG"
log_dir = "var/log/inference1"

[[openai.models]]
engine = "llama-server"
id = "gemma"
context_size = 4096
port = 8100
