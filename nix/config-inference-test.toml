# Inference server config for NixOS VM tests.
# Uses dummy engine — no real model downloads or llama-server subprocesses.
# Mirrors config-inference-1.toml but uses absolute /tmp paths so the
# server can be started without a fixed working directory.
models_dir = "/tmp/inference-models"

[server]
host = "127.0.0.1"
port = 8001

[logging]
log_level = "DEBUG"
log_dir = "/tmp/inference-logs"

[[openai.models]]
engine = "dummy"
id = "gemma"
task = "chat"
max_requests = 21
port = 8100

[[openai.models]]
engine = "dummy"
id = "embeddinggemma"
task = "embedding"
port = 8101
