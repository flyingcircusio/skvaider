# Inference server config for NixOS VM tests.
# Mirrors config-inference-1.toml but uses absolute /tmp paths so the
# server can be started without a fixed working directory.
models_dir = "/tmp/inference-models"

[server]
host = "127.0.0.1"
port = 8001

[logging]
log_level = "DEBUG"
log_dir = "/tmp/inference-logs"

[[openai.models]]
engine = "llama-server"
id = "gemma"
context_size = 4096
port = 8100
cmd_args = []
max_requests = 21
task = "chat"

[[openai.models.files]]
url = "https://huggingface.co/unsloth/gemma-3-270m-it-GGUF/resolve/main/gemma-3-270m-it-UD-Q4_K_XL.gguf?download=true"
hash = "e5420636e0cbfee24051ff22e9719380a3a93207a472edb18dd0c89a95f6ef80"

[[openai.models]]
engine = "llama-server"
id = "embeddinggemma"
task = "embedding"
cmd_args = ["-ngl", "0"]
port = 8101
context_size = 4096

[[openai.models.files]]
url = "https://huggingface.co/unsloth/embeddinggemma-300m-GGUF/resolve/main/embeddinggemma-300M-F32.gguf"
hash = "a3125072128fc76d1c1d8d19f7b095c7e3bfbf00594dcf8a8bd3bcb334935d57"
