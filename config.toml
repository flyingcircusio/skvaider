# Sample config used by the development environment
[auth]
static_tokens = [ "developer" ]

[debug]
slow_threshold = 5

[server]
host = "127.0.0.1"
port = 8000
directory = "var/lib/skvaider"

[[backend]]
type = "skvaider"
url = "http://127.0.0.1:8001"

[[backend]]
type = "skvaider"
url = "http://127.0.0.1:8002"

[[models]]
id = "gemma"
task = "chat"
instances = 2
memory = { ram = "1.3G" }


[[models]]
id = "embeddinggemma"
task = "embedding"
instances = 1
memory = { ram = "1.4G" }

[logging]
log_level = "DEBUG"
log_dir = "var/log/skvaider"
